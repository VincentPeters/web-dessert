<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta name="description" content="{{description}}" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      content="#1a1410"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f5ece0"
      media="(prefers-color-scheme: light)"
    />
    <title>{{title}} — Web Dessert</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>"
    />
    <style>
      {{css}}
    </style>
  </head>
  <body>
    <header>
      <canvas class="desert" aria-hidden="true"></canvas>
      <nav>
        <a href="/">Home</a>
        <button class="theme-toggle" aria-label="Toggle theme">sun</button>
      </nav>
    </header>
    <main>{{content}}</main>
    <footer>
      <p>&copy; 2026 Web Dessert</p>
    </footer>
    <script src="/js/theme.js"></script>
    <script src="/js/desert.js"></script>
  </body>
</html>
